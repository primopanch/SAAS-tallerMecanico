# Configuración de Servidor
server.port=8080

# Nombre de la aplicación
spring.application.name=taller-mecanico-api

# Configuración de la Base de Datos (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/taller_mecanico?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# En entorno dev, 'update' es útil. Como usaremos schema.sql inicial, podemos dejarlo en 'update' o 'none'
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Inicialización de SQL
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
